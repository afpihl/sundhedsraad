name: Daglig opdatering af sundhedsraad-data
 
on:
  schedule:
    - cron: "0 5 * * *"   # hver dag kl. 05:00 UTC = 06:00 (vinter) / 07:00 (sommer) dansk tid
  workflow_dispatch:        # giver dig mulighed for at trykke "Run" manuelt
 
jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Hent repo
        uses: actions/checkout@v4
 
      - name: Opsæt Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: Installer afhængigheder
        run: pip install requests beautifulsoup4 lxml
 
      - name: Kør scraper
        run: python3 scraper.py
 
      - name: Commit hvis der er ændringer
        run: |
          git config user.name  "sundhedsraad-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || (git commit -m "Automatisk opdatering $(date -I)" && git push)
 
