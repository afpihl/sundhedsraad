name: Daglig hentning af sundhedsraad-referater

on:
  schedule:
    - cron: "0 5 * * *"   # kl. 05:00 UTC hver dag = 06:00 dansk vintertid / 07:00 sommertid
  workflow_dispatch:

jobs:
  referater:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Hent repo
        uses: actions/checkout@v4

      - name: Opsæt Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer afhængigheder
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml google-api-python-client google-auth

      - name: Kør referat-scraper
        run: python3 download_referater.py

      - name: Commit nye referater
        id: commit
        run: |
          git config user.name  "sundhedsraad-bot"
          git config user.email "bot@users.noreply.github.com"
          git add referater/ referater-manifest.json
          if git diff --cached --quiet; then
            echo "Ingen ændringer at commit'e."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Referater: automatisk opdatering $(date -I)"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Upload nye referater til Google Drive
        if: steps.commit.outputs.changed == 'true'
        env:
          GDRIVE_SERVICE_ACCOUNT: ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}
          DRIVE_ROOT_FOLDER_ID:   ${{ secrets.DRIVE_ROOT_FOLDER_ID }}
        run: python3 upload_to_drive.py
